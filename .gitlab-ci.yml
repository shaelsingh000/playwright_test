stages:
  - test
  - report
  - deploy

variables:
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

test:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.58.0-jammy

  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pytest --alluredir=allure-results || true

  artifacts:
    when: always
    paths:
      - allure-results

report:
  stage: report
  image: eclipse-temurin:17-jdk-jammy

  dependencies:
    - test

  when: always

  before_script:
    - apt-get update && apt-get install -y wget unzip
    - wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
    - unzip allure-2.27.0.zip
    - mv allure-2.27.0 /opt/allure
    - ln -s /opt/allure/bin/allure /usr/bin/allure

  script:
    # ✅ Pull previous history (from Pages)
    - mkdir -p allure-results/history
    - if [ -d public/history ]; then cp -r public/history allure-results/; fi

    # ✅ Generate report with history
    - allure generate allure-results -o allure-report --clean

    # ✅ Save history for next pipeline
    - cp -r allure-report/history allure-results/ || true

  artifacts:
    when: always
    paths:
      - allure-report
      - allure-results

pages:
  stage: deploy
  dependencies:
    - report

  script:
    # ✅ Move final report to GitLab Pages
    - mv allure-report public

  artifacts:
    paths:
      - public

  only:
    - main
  
  when: always