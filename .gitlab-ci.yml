stages:
  - test
  - report
  - deploy

variables:
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

test:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.58.0-jammy

  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pytest --alluredir=allure-results || true

  artifacts:
    when: always
    paths:
      - allure-results

report:
  stage: report
  image: eclipse-temurin:17-jdk-jammy

  dependencies:
    - test

  when: always

  before_script:
    - apt-get update && apt-get install -y wget unzip
    - wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
    - unzip allure-2.27.0.zip
    - mv allure-2.27.0 /opt/allure
    - ln -s /opt/allure/bin/allure /usr/bin/allure

  script:
    # ✅ Step 1: Download previous history
    - wget https://playwright-tests-91d4df.gitlab.io/history.tar.gz || true
    - mkdir -p old-history
    - tar -xzf history.tar.gz -C old-history || true

    # ✅ Step 2: Inject into results
    - if [ -d old-history/history ]; then cp -r old-history/history allure-results/; fi

    # ✅ Step 3: Generate report
    - allure generate allure-results -o allure-report --clean

    # ✅ Step 4: Prepare FINAL public folder
    - mkdir public
    - cp -r allure-report/* public/

    # ✅ Step 5: Save history for next run
    - tar -czf public/history.tar.gz -C allure-report history

  artifacts:
    when: always
    paths:
      - public
  
pages:
  stage: deploy

  dependencies:
    - report

  script:
    - echo "Deploying Pages..."

  artifacts:
    paths:
      - public

  only:
    - main

  when: always