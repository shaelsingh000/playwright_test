stages:
  - test
  - report
  - deploy

variables:
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

test:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.58.0-jammy

  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pytest --alluredir=allure-results || true

  artifacts:
    when: always
    paths:
      - allure-results

report:
  stage: report
  image: eclipse-temurin:17-jdk-jammy

  dependencies:
    - test

  when: always

  before_script:
    - apt-get update && apt-get install -y wget unzip
    - wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
    - unzip allure-2.27.0.zip
    - mv allure-2.27.0 /opt/allure
    - ln -s /opt/allure/bin/allure /usr/bin/allure

  script:
    # ✅ STEP 1: Download previous history from GitLab Pages
    - mkdir -p allure-report
    - wget https://playwright-tests-91d4df.gitlab.io/history.tar.gz || true
    - tar -xzf history.tar.gz -C allure-report || true

    # ✅ STEP 2: Inject history into results
    - if [ -d allure-report/history ]; then cp -r allure-report/history allure-results/; fi

    # ✅ STEP 3: Generate new report with trends
    - allure generate allure-results -o allure-report --clean

    # ✅ STEP 4: Save history for next run
    - mkdir -p public
    - cp -r allure-report/history public/
    - tar -czf public/history.tar.gz allure-report/history

  artifacts:
    when: always
    paths:
      - allure-report
      - public

pages:
  stage: deploy
  dependencies:
    - report

  script:
    # ✅ Move final report to GitLab Pages
    - mv allure-report public

  artifacts:
    paths:
      - public

  only:
    - main
  
  when: always